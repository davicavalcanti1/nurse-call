<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Chamados</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Segoe UI', sans-serif;
    padding: 24px;
  }
  h1 { font-size: 1rem; letter-spacing: 2px; color: #38bdf8; margin-bottom: 6px; text-transform: uppercase; }
  p  { font-size: 0.75rem; color: #8b949e; margin-bottom: 24px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }

  .item {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }

  .item-nome {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #e6edf3;
  }

  .item.ativo { border-color: #ef4444; background: #1a0505; }
  .item.ativo .item-nome { color: #fca5a5; }

  .btn-chamar {
    width: 100%;
    padding: 8px;
    background: #ef4444;
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-chamar:hover { opacity: 0.8; }

  .btn-cancelar {
    width: 100%;
    padding: 8px;
    background: transparent;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #8b949e;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .btn-cancelar:hover { border-color: #8b949e; color: #e6edf3; }
  .item.ativo .btn-cancelar { display: block; }

  .led {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px #22c55e;
  }
  .item.ativo .led {
    background: #ef4444;
    box-shadow: 0 0 8px #ef4444;
    animation: p 0.5s infinite;
  }
  @keyframes p { 0%,100%{opacity:1} 50%{opacity:0.1} }

  .topo {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .btn-todos {
    padding: 8px 18px;
    background: transparent;
    border: 1px solid #ef444466;
    color: #f87171;
    border-radius: 6px;
    font-size: 0.72rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    align-self: flex-end;
  }
  .btn-todos:hover { background: #7f1d1d44; border-color: #ef4444; }
</style>
</head>
<body>

<div class="topo">
  <div>
    <h1>Simulador de Chamados</h1>
    <p>Simula os interruptores WiFi → abre em outra aba ou no celular</p>
  </div>
  <button class="btn-todos" onclick="cancelarTodos()">Cancelar Todos</button>
</div>

<div class="grid" id="grid"></div>

<script>
const quartos = Array.from({ length: 20 }, (_, i) => ({
  id: `quarto-${String(i + 1).padStart(2, '0')}`,
  nome: `Quarto ${String(i + 1).padStart(2, '0')}`
}));

const grid = document.getElementById('grid');

quartos.forEach(q => {
  const item = document.createElement('div');
  item.className = 'item';
  item.id = 'item-' + q.id;
  item.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;width:100%">
      <div class="led" id="led-${q.id}"></div>
      <span class="item-nome">${q.nome}</span>
    </div>
    <button class="btn-chamar"   onclick="chamar('${q.id}')">🔔 Chamar</button>
    <button class="btn-cancelar" onclick="cancelar('${q.id}')">✖ Cancelar</button>
  `;
  grid.appendChild(item);
});

async function chamar(id) {
  await fetch('/api/alert', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ room: id })
  });
  document.getElementById('item-' + id).classList.add('ativo');
}

async function cancelar(id) {
  await fetch('/api/clear', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ room: id })
  });
  document.getElementById('item-' + id).classList.remove('ativo');
}

async function cancelarTodos() {
  for (const q of quartos) await cancelar(q.id);
}
</script>
</body>
</html>
