<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Enfermagem</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --text:    #e6edf3;
    --muted:   #8b949e;
    --header:  58px;
    --parede:  #334155;

    --chamada:     #ef4444;
    --atendimento: #f59e0b;
    --apoio:       #3b82f6;
    --verde:       #22c55e;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }

  /* ── HEADER ── */
  header {
    height: var(--header); background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 18px; gap: 16px;
  }
  .pulso { width: 10px; height: 10px; border-radius: 50%;
    background: var(--verde); box-shadow: 0 0 6px var(--verde); flex-shrink: 0; }
  .pulso.alerta { background: var(--chamada); box-shadow: 0 0 8px var(--chamada); animation: piscar .6s infinite; }
  header h1 { font-size: .85rem; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; }
  .spacer { flex: 1; }
  .relogio { font-size: .95rem; font-variant-numeric: tabular-nums; color: var(--muted); }
  .badge-alertas { font-size: .72rem; color: var(--muted); white-space: nowrap; }
  .badge-alertas span { font-weight: 700; font-size: .95rem; color: var(--chamada); }
  .conn { font-size: .62rem; letter-spacing: 1px; padding: 3px 10px; border-radius: 20px;
    border: 1px solid; text-transform: uppercase; white-space: nowrap; }
  .conn.ok  { color: var(--verde); border-color: var(--verde); background: #0f2e1a; }
  .conn.off { color: #f59e0b; border-color: #f59e0b; background: #2d1a00; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 2px; }
  .tab-btn { padding: 7px 16px; background: transparent; border: none;
    border-bottom: 2px solid transparent; color: var(--muted);
    cursor: pointer; font-size: .75rem; letter-spacing: 1px;
    text-transform: uppercase; transition: color .2s, border-color .2s; }
  .tab-btn.ativo { color: #38bdf8; border-bottom-color: #38bdf8; }

  /* ── PÁGINAS ── */
  .pagina { display: none; height: calc(100vh - var(--header)); overflow: auto; }
  .pagina.ativo { display: flex; flex-direction: column; }

  /* ════════════════════════════════════════════
     PLANTA BAIXA
  ════════════════════════════════════════════ */
  #pg-central.ativo {
    display: grid;
    grid-template-columns: 1.4fr 1fr 0.65fr 1fr 1.4fr;
    grid-template-rows: 0.75fr 1fr 1fr 1fr 1fr 1fr;
    grid-template-areas:
      "rec   rec   centa  bf    bm   "
      "l01   l02   corra  l03   l04  "
      "l05   l06   corra  l07   l08  "
      "l09   l10   posto  l11   l12  "
      "l13   l14   corrb  l15   l16  "
      "l17   l18   corrb  l19   l20  ";
    gap: 4px;
    background: var(--parede);
    padding: 4px;
    height: calc(100vh - var(--header));
    overflow: hidden;
  }

  /* ── CARD BASE ── */
  .card {
    --ac: var(--verde);
    background: #e8edf2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px; cursor: pointer; position: relative;
    overflow: hidden; padding: 6px; transition: background .2s;
    border-radius: 3px;
    color: #1e293b;
  }
  .card:hover { filter: brightness(.95); }

  /* Tarja lateral de tipo */
  .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--verde); transition: background .2s; border-radius: 3px 0 0 3px; }

  .led { width: 10px; height: 10px; border-radius: 50%;
    background: var(--verde); box-shadow: 0 0 4px var(--verde);
    border: 1px solid #ffffff44; flex-shrink: 0; }
  .card-icone  { font-size: clamp(.9rem, 2vw, 1.3rem); line-height: 1; }
  .card-nome   { font-size: clamp(.5rem, 1.1vw, .72rem); font-weight: 700;
    letter-spacing: .3px; text-transform: uppercase; text-align: center;
    line-height: 1.2; color: #1e293b; }
  .card-paciente, .card-tipo, .card-hora, .btn-atender { display: none; }

  /* Alerta: mostra os detalhes */
  .card.alerta .card-paciente {
    display: block; font-size: clamp(.45rem, .9vw, .6rem);
    color: color-mix(in srgb, var(--ac) 20%, #000);
    text-align: center; width: 100%; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; padding: 0 4px;
  }
  .card.alerta .card-tipo {
    display: block; font-size: clamp(.42rem, .85vw, .58rem);
    font-weight: 700; text-align: center;
    color: color-mix(in srgb, var(--ac) 80%, #000);
  }
  .card.alerta .card-hora {
    display: block; font-size: clamp(.4rem, .8vw, .56rem);
    font-variant-numeric: tabular-nums;
    color: color-mix(in srgb, var(--ac) 60%, #333); text-align: center;
  }
  .card.alerta .btn-atender {
    display: block; border: none; color: #fff;
    font-size: clamp(.4rem, .8vw, .54rem); font-weight: 700;
    letter-spacing: .5px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 3px; cursor: pointer;
    background: var(--ac); transition: opacity .2s; white-space: nowrap;
  }
  .btn-atender:hover { opacity: .8; }

  /* ── ALERTA ATIVO ── */
  .card.alerta { background: color-mix(in srgb, var(--ac) 18%, #fff); }
  .card.alerta::before { background: var(--ac); }
  .card.alerta .led {
    background: var(--ac); box-shadow: 0 0 7px var(--ac);
    border-color: color-mix(in srgb, var(--ac) 60%, #fff);
    animation: piscar .5s infinite;
  }
  .card.alerta .card-nome { color: color-mix(in srgb, var(--ac) 70%, #000); }
  .card.alerta::after { content: ''; position: absolute; inset: 0;
    border: 2px solid var(--ac); border-radius: 3px;
    pointer-events: none; animation: piscar .6s infinite; }

  .card[data-tipo="chamada"]     { --ac: var(--chamada); }
  .card[data-tipo="atendimento"] { --ac: var(--atendimento); }
  .card[data-tipo="apoio"]       { --ac: var(--apoio); }

  @keyframes piscar { 0%,100%{opacity:1} 50%{opacity:.15} }

  /* ── Tipos de cômodo ── */
  .card.tipo-leito    { background: #f1f5f9; }
  .card.tipo-corredor { background: #dde3ea; cursor: default; }
  .card.tipo-corredor:hover { filter: none; }
  .card.tipo-banheiro { background: #e0f2fe; }
  .card.tipo-recepcao { background: #f0fdf4; }

  .card.tipo-posto {
    background: #1e3a5f; color: #bfdbfe;
    cursor: default; border: none;
  }
  .card.tipo-posto::before   { background: #3b82f6; }
  .card.tipo-posto .card-nome { color: #bfdbfe; font-size: clamp(.5rem, 1.1vw, .72rem); }
  .card.tipo-posto .card-icone { font-size: clamp(1rem, 2.2vw, 1.5rem); }
  .card.tipo-posto .led { background: #3b82f6; box-shadow: 0 0 5px #3b82f6; }

  /* ── Grid areas ── */
  .area-rec   { grid-area: rec;   }
  .area-centa { grid-area: centa; }
  .area-bf    { grid-area: bf;    }
  .area-bm    { grid-area: bm;    }
  .area-corra { grid-area: corra; }
  .area-posto { grid-area: posto; }
  .area-corrb { grid-area: corrb; }
  .area-l01   { grid-area: l01;   } .area-l02  { grid-area: l02;  }
  .area-l03   { grid-area: l03;   } .area-l04  { grid-area: l04;  }
  .area-l05   { grid-area: l05;   } .area-l06  { grid-area: l06;  }
  .area-l07   { grid-area: l07;   } .area-l08  { grid-area: l08;  }
  .area-l09   { grid-area: l09;   } .area-l10  { grid-area: l10;  }
  .area-l11   { grid-area: l11;   } .area-l12  { grid-area: l12;  }
  .area-l13   { grid-area: l13;   } .area-l14  { grid-area: l14;  }
  .area-l15   { grid-area: l15;   } .area-l16  { grid-area: l16;  }
  .area-l17   { grid-area: l17;   } .area-l18  { grid-area: l18;  }
  .area-l19   { grid-area: l19;   } .area-l20  { grid-area: l20;  }

  /* ── AVISO ÁUDIO ── */
  .aviso-audio { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid #f59e0b; color: #fbbf24;
    font-size: .7rem; letter-spacing: 1px; padding: 7px 18px; border-radius: 20px;
    cursor: pointer; animation: piscar 1.5s infinite; z-index: 999; }
  .aviso-audio.oculto { display: none; }

  /* ── Legenda ── */
  .legenda { position: fixed; bottom: 12px; right: 12px;
    display: flex; gap: 10px; align-items: center; }
  .leg-item { display: flex; align-items: center; gap: 5px;
    font-size: .62rem; color: var(--muted); }
  .leg-dot  { width: 9px; height: 9px; border-radius: 50%; }

  /* ════════════════════════════════════════════
     CADASTRO
  ════════════════════════════════════════════ */
  #pg-cadastro { padding: 28px; gap: 20px; }
  .cad-titulo  { font-size: .95rem; letter-spacing: 2px; text-transform: uppercase; color: #38bdf8; }
  .cad-form    { background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px; display: flex; flex-direction: column;
    gap: 14px; max-width: 480px; }
  .cad-form label { font-size: .7rem; color: var(--muted); letter-spacing: 1px;
    text-transform: uppercase; display: flex; flex-direction: column; gap: 5px; }
  .cad-form select, .cad-form input {
    width: 100%; padding: 9px 12px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: .85rem; outline: none; transition: border-color .2s; }
  .cad-form select:focus, .cad-form input:focus { border-color: #38bdf8; }
  .cad-form button { padding: 9px; background: #38bdf8; border: none; border-radius: 6px;
    color: #000; font-weight: 700; font-size: .8rem; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer; transition: opacity .2s; }
  .cad-form button:hover { opacity: .85; }
  .cad-lista  { flex: 1; overflow: auto; }
  .cad-table  { width: 100%; max-width: 680px; border-collapse: collapse; font-size: .78rem; }
  .cad-table th { text-align: left; padding: 7px 12px; color: var(--muted);
    letter-spacing: 1px; text-transform: uppercase; font-size: .62rem;
    border-bottom: 1px solid var(--border); }
  .cad-table td { padding: 7px 12px; border-bottom: 1px solid #ffffff08; }
  .cad-table tr:hover td { background: var(--surface); }
  .sem-pac { color: #374151; font-style: italic; }
  .btn-rem { background: transparent; border: 1px solid #7f1d1d; color: #f87171;
    padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: .62rem; }
  .btn-rem:hover { background: #7f1d1d44; }

  /* ════════════════════════════════════════════
     LOGS
  ════════════════════════════════════════════ */
  #pg-logs   { padding: 18px; gap: 14px; }
  .logs-topo { display: flex; align-items: center; justify-content: space-between; }
  .logs-titulo { font-size: .95rem; letter-spacing: 2px; text-transform: uppercase; color: #38bdf8; }
  .btn-limpar { background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: .68rem; letter-spacing: 1px; }
  .btn-limpar:hover { border-color: #8b949e; color: var(--text); }
  .log-lista { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
  .log-item  { display: grid; grid-template-columns: 76px 160px 160px 1fr;
    gap: 12px; align-items: center; padding: 8px 14px; border-radius: 6px;
    background: var(--surface); border-left: 3px solid var(--border);
    font-size: .76rem; animation: entrar .3s ease; }
  @keyframes entrar { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:none} }
  .log-item[data-tipo="chamada"]     { border-left-color: var(--chamada); }
  .log-item[data-tipo="atendimento"] { border-left-color: var(--atendimento); }
  .log-item[data-tipo="apoio"]       { border-left-color: var(--apoio); }
  .log-item[data-tipo="atendido"]    { border-left-color: var(--verde); }
  .log-ts  { color: var(--muted); font-variant-numeric: tabular-nums; font-size: .68rem; }
  .log-room { font-weight: 600; text-transform: uppercase; font-size: .7rem; }
  .log-pac  { color: var(--muted); }
  .log-evento[data-tipo="chamada"]     { color: var(--chamada); font-weight: 600; }
  .log-evento[data-tipo="atendimento"] { color: var(--atendimento); font-weight: 600; }
  .log-evento[data-tipo="apoio"]       { color: var(--apoio); font-weight: 600; }
  .log-evento[data-tipo="atendido"]    { color: var(--verde); font-weight: 600; }
</style>
</head>
<body>

<header>
  <div class="pulso" id="pulsoHeader"></div>
  <h1>Central de Enfermagem</h1>
  <div class="tabs">
    <button class="tab-btn ativo" onclick="mudarTab('central',this)">Planta</button>
    <button class="tab-btn"       onclick="mudarTab('cadastro',this)">Cadastro</button>
    <button class="tab-btn"       onclick="mudarTab('logs',this)">Logs</button>
  </div>
  <div class="spacer"></div>
  <div class="badge-alertas">Ativos: <span id="qtdAlertas">0</span></div>
  <div class="relogio" id="relogio">00:00:00</div>
  <div class="conn off" id="connBadge">Conectando…</div>
</header>

<!-- ══ PLANTA ══ -->
<div class="pagina ativo" id="pg-central"></div>

<!-- ══ CADASTRO ══ -->
<div class="pagina" id="pg-cadastro">
  <div class="cad-titulo">Cadastro de Pacientes</div>
  <div class="cad-form">
    <label>Local / Leito
      <select id="cadSala"></select>
    </label>
    <label>Nome do Paciente
      <input type="text" id="cadNome" placeholder="Ex: Maria Aparecida" maxlength="60">
    </label>
    <button onclick="salvarPaciente()">Salvar</button>
  </div>
  <div class="cad-lista">
    <table class="cad-table">
      <thead><tr><th>Local</th><th>Paciente</th><th></th></tr></thead>
      <tbody id="cadTabela"></tbody>
    </table>
  </div>
</div>

<!-- ══ LOGS ══ -->
<div class="pagina" id="pg-logs">
  <div class="logs-topo">
    <span class="logs-titulo">Log de Eventos</span>
    <button class="btn-limpar" onclick="document.getElementById('logLista').innerHTML=''">Limpar tela</button>
  </div>
  <div class="log-lista" id="logLista"></div>
</div>

<!-- Legenda -->
<div class="legenda" id="legendaEl">
  <div class="leg-item"><div class="leg-dot" style="background:var(--chamada)"></div>Enfermagem</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--atendimento)"></div>Atendimento</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--apoio)"></div>Apoio</div>
</div>

<div class="aviso-audio" id="avisoAudio" onclick="ativarAudio()">🔇 Clique para ativar som</div>

<script>
// ══ Definição das salas ═══════════════════════════════════════════════════════
const SALAS = [
  // Área de entrada
  { id: 'recepcao',           nome: 'Recepção',           area: 'rec',   icon: '🏥', tipo: 'recepcao' },
  { id: 'corredor-entrada',   nome: 'Corredor Entrada',   area: 'centa', icon: '🚶', tipo: 'corredor' },
  { id: 'banheiro-feminino',  nome: 'Banheiro ♀',         area: 'bf',    icon: '🚺', tipo: 'banheiro' },
  { id: 'banheiro-masculino', nome: 'Banheiro ♂',         area: 'bm',    icon: '🚹', tipo: 'banheiro' },
  // Ala esquerda - superior
  { id: 'leito-01', nome: 'Leito 01', area: 'l01', icon: '🛏️', tipo: 'leito' },
  { id: 'leito-02', nome: 'Leito 02', area: 'l02', icon: '🛏️', tipo: 'leito' },
  // Corredor central A
  { id: 'corredor-a', nome: 'Corredor A', area: 'corra', icon: '🚶', tipo: 'corredor' },
  // Ala direita - superior
  { id: 'leito-03', nome: 'Leito 03', area: 'l03', icon: '🛏️', tipo: 'leito' },
  { id: 'leito-04', nome: 'Leito 04', area: 'l04', icon: '🛏️', tipo: 'leito' },
  // Ala esquerda - meio-superior
  { id: 'leito-05', nome: 'Leito 05', area: 'l05', icon: '🛏️', tipo: 'leito' },
  { id: 'leito-06', nome: 'Leito 06', area: 'l06', icon: '🛏️', tipo: 'leito' },
  // Ala direita - meio-superior
  { id: 'leito-07', nome: 'Leito 07', area: 'l07', icon: '🛏️', tipo: 'leito' },
  { id: 'leito-08', nome: 'Leito 08', area: 'l08', icon: '🛏️', tipo: 'leito' },
  // Ala esquerda - centro
  { id: 'leito-09', nome: 'Leito 09', area: 'l09', icon: '🛏️', tipo: 'leito' },
  { id: 'leito-10', nome: 'Leito 10', area: 'l10', icon: '🛏️', tipo: 'leito' },
  // Posto de enfermagem (não interativo)
  { id: 'posto-enfermagem', nome: 'Posto de Enfermagem', area: 'posto', icon: '👩‍⚕️', tipo: 'posto', readonly: true },
  // Ala direita - centro
  { id: 'leito-11', nome: 'Leito 11', area: 'l11', icon: '🛏️', tipo: 'leito' },
  { id: 'leito-12', nome: 'Leito 12', area: 'l12', icon: '🛏️', tipo: 'leito' },
  // Ala esquerda - inferior
  { id: 'leito-13', nome: 'Leito 13', area: 'l13', icon: '🛏️', tipo: 'leito' },
  { id: 'leito-14', nome: 'Leito 14', area: 'l14', icon: '🛏️', tipo: 'leito' },
  // Corredor central B
  { id: 'corredor-b', nome: 'Corredor B', area: 'corrb', icon: '🚶', tipo: 'corredor' },
  // Ala direita - inferior
  { id: 'leito-15', nome: 'Leito 15', area: 'l15', icon: '🛏️', tipo: 'leito' },
  { id: 'leito-16', nome: 'Leito 16', area: 'l16', icon: '🛏️', tipo: 'leito' },
  // Ala esquerda - fundo
  { id: 'leito-17', nome: 'Leito 17', area: 'l17', icon: '🛏️', tipo: 'leito' },
  { id: 'leito-18', nome: 'Leito 18', area: 'l18', icon: '🛏️', tipo: 'leito' },
  // Ala direita - fundo
  { id: 'leito-19', nome: 'Leito 19', area: 'l19', icon: '🛏️', tipo: 'leito' },
  { id: 'leito-20', nome: 'Leito 20', area: 'l20', icon: '🛏️', tipo: 'leito' },
];

// ══ Áudio ═════════════════════════════════════════════════════════════════════
let audioCtx = null, audioOk = false;
const sonsAtivos = {};

function ativarAudio() {
  if (audioOk) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const buf = audioCtx.createBuffer(1,1,22050);
  const src = audioCtx.createBufferSource();
  src.buffer = buf; src.connect(audioCtx.destination); src.start(0);
  audioOk = true;
  document.getElementById('avisoAudio').classList.add('oculto');
  setTimeout(() => tocarBip('chamada'), 100);
}
document.addEventListener('click',      ativarAudio, { once: true });
document.addEventListener('touchstart', ativarAudio, { once: true });

const SONS = {
  chamada:     [[960,.12],[480,.23]],
  atendimento: [[600,.18],[520,.30]],
  apoio:       [[1100,.08],[900,.08],[1100,.08]],
};
function tocarBip(tipo) {
  if (!audioCtx || !audioOk) return;
  const passos = SONS[tipo] || SONS.chamada;
  let t = audioCtx.currentTime;
  passos.forEach(([freq,dur]) => {
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = tipo === 'apoio' ? 'sine' : 'square';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(.22, t);
    gain.gain.exponentialRampToValueAtTime(.001, t+dur);
    osc.start(t); osc.stop(t+dur); t += dur;
  });
}
function iniciarSom(id, tipo) {
  if (sonsAtivos[id]) return;
  tocarBip(tipo);
  sonsAtivos[id] = setInterval(() => tocarBip(tipo), 1200);
}
function pararSom(id) { clearInterval(sonsAtivos[id]); delete sonsAtivos[id]; }

// ══ Tabs ══════════════════════════════════════════════════════════════════════
function mudarTab(nome, btn) {
  document.querySelectorAll('.pagina').forEach(p => p.classList.remove('ativo'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('ativo'));
  document.getElementById('pg-' + nome).classList.add('ativo');
  btn.classList.add('ativo');
  document.getElementById('legendaEl').style.display = nome === 'central' ? '' : 'none';
}

// ══ Montar planta ═════════════════════════════════════════════════════════════
const planta = document.getElementById('pg-central');
SALAS.forEach(s => {
  const card = document.createElement('div');
  card.className = `card tipo-${s.tipo} area-${s.area}`;
  card.id = 'card-' + s.id;

  if (s.readonly) {
    // Posto de enfermagem: não interativo
    card.innerHTML = `
      <div class="led"></div>
      <div class="card-icone">${s.icon}</div>
      <div class="card-nome">${s.nome}</div>
    `;
  } else {
    card.innerHTML = `
      <div class="led"></div>
      <div class="card-icone">${s.icon}</div>
      <div class="card-nome">${s.nome}</div>
      <div class="card-paciente" id="cpac-${s.id}"></div>
      <div class="card-tipo"     id="ctipo-${s.id}"></div>
      <div class="card-hora"     id="chora-${s.id}"></div>
      <button class="btn-atender" onclick="atender('${s.id}',event)">✔ Atender</button>
    `;
    card.addEventListener('click', () => {/* clique visual apenas */});
  }
  planta.appendChild(card);
});

// ══ Montar select do cadastro ═════════════════════════════════════════════════
const cadSala = document.getElementById('cadSala');
SALAS.filter(s => !s.readonly).forEach(s => {
  const op = document.createElement('option');
  op.value = s.id; op.textContent = s.nome;
  cadSala.appendChild(op);
});

// ══ Alertas ═══════════════════════════════════════════════════════════════════
const TIPO_LABEL = {
  chamada:     '🔴 Chamou Enfermagem',
  atendimento: '🟠 Atendimento',
  apoio:       '🔵 Apoio',
};

function ativarAlerta(id, hora, tipo, paciente) {
  const card = document.getElementById('card-' + id);
  if (!card || card.classList.contains('tipo-posto')) return;
  card.classList.add('alerta');
  card.dataset.tipo = tipo || 'chamada';
  const el = n => document.getElementById(n + id);
  if (el('ctipo-')) el('ctipo-').textContent = TIPO_LABEL[tipo] || tipo;
  if (el('chora-')) el('chora-').textContent = hora || '';
  if (el('cpac-') && paciente) el('cpac-').textContent = paciente;
  iniciarSom(id, tipo || 'chamada');
  atualizarContador();
}

function desativarAlerta(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  card.classList.remove('alerta');
  delete card.dataset.tipo;
  const el = n => document.getElementById(n + id);
  if (el('ctipo-')) el('ctipo-').textContent = '';
  if (el('chora-')) el('chora-').textContent = '';
  pararSom(id);
  atualizarContador();
}

function atualizarContador() {
  const qtd = document.querySelectorAll('.card.alerta').length;
  document.getElementById('qtdAlertas').textContent = qtd;
  document.getElementById('pulsoHeader').classList.toggle('alerta', qtd > 0);
}

function atender(id, e) {
  e.stopPropagation();
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'atender', room: id }));
  } else {
    fetch('/api/clear', { method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ room: id }) });
  }
  desativarAlerta(id);
}

// ══ Pacientes ═════════════════════════════════════════════════════════════════
const pacientesLocais = {};

function atualizarPaciente(room, nome) {
  if (nome) pacientesLocais[room] = nome; else delete pacientesLocais[room];
  const el = document.getElementById('cpac-' + room);
  if (el) el.textContent = nome || '';
  renderTabela();
}

function renderTabela() {
  const tbody = document.getElementById('cadTabela');
  tbody.innerHTML = '';
  SALAS.filter(s => !s.readonly).forEach(s => {
    const nome = pacientesLocais[s.id] || '';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${s.nome}</td>
      <td class="${nome ? '' : 'sem-pac'}">${nome || '— sem paciente —'}</td>
      <td>${nome ? `<button class="btn-rem" onclick="removerPaciente('${s.id}')">Remover</button>` : ''}</td>
    `;
    tbody.appendChild(tr);
  });
}

function salvarPaciente() {
  const room = document.getElementById('cadSala').value;
  const nome = document.getElementById('cadNome').value.trim();
  fetch('/api/paciente', { method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ room, nome }) });
  atualizarPaciente(room, nome);
  document.getElementById('cadNome').value = '';
}
function removerPaciente(room) {
  fetch('/api/paciente', { method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ room, nome: '' }) });
  atualizarPaciente(room, '');
}

// ══ Logs ══════════════════════════════════════════════════════════════════════
function adicionarLog(entry) {
  const lista = document.getElementById('logLista');
  const sala  = SALAS.find(s => s.id === entry.room);
  const div   = document.createElement('div');
  div.className   = 'log-item';
  div.dataset.tipo = entry.tipo;
  div.innerHTML = `
    <span class="log-ts">${entry.ts}</span>
    <span class="log-room">${sala?.nome || entry.room}</span>
    <span class="log-pac">${entry.paciente || '—'}</span>
    <span class="log-evento" data-tipo="${entry.tipo}">${entry.evento}</span>
  `;
  lista.prepend(div);
  while (lista.children.length > 200) lista.lastChild.remove();
}

// ══ Relógio ═══════════════════════════════════════════════════════════════════
setInterval(() => {
  document.getElementById('relogio').textContent = new Date().toLocaleTimeString('pt-BR');
}, 1000);

// ══ Polling HTTP ══════════════════════════════════════════════════════════════
async function sincronizar() {
  try {
    const res  = await fetch('/api/status');
    const data = await res.json();
    SALAS.filter(s => !s.readonly).forEach(s => {
      const card  = document.getElementById('card-' + s.id);
      const ativo = !!data[s.id];
      const jaEsta = card.classList.contains('alerta');
      if (ativo && !jaEsta) ativarAlerta(s.id, data[s.id].hora, data[s.id].tipo, data[s.id].paciente);
      if (!ativo && jaEsta) desativarAlerta(s.id);
    });
  } catch (_) {}
}
sincronizar();
setInterval(sincronizar, 2000);

// ══ WebSocket ═════════════════════════════════════════════════════════════════
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;
let ws;

function conectar() {
  ws = new WebSocket(WS_URL);
  ws.onopen  = () => { document.getElementById('connBadge').textContent = 'Conectado';
    document.getElementById('connBadge').className = 'conn ok'; };
  ws.onclose = () => { document.getElementById('connBadge').textContent = 'Polling ativo';
    document.getElementById('connBadge').className = 'conn off'; setTimeout(conectar, 3000); };
  ws.onerror = () => ws.close();

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'init') {
      Object.entries(msg.pacientes || {}).forEach(([r,n]) => atualizarPaciente(r,n));
      Object.values(msg.alertas   || {}).forEach(a => ativarAlerta(a.room, a.hora, a.tipo, a.paciente));
      (msg.logs || []).slice().reverse().forEach(adicionarLog);
      renderTabela();
    }
    if (msg.type === 'alerta')   { msg.ativo ? ativarAlerta(msg.room, msg.hora, msg.tipo, msg.paciente) : desativarAlerta(msg.room); }
    if (msg.type === 'atendido') { desativarAlerta(msg.room); }
    if (msg.type === 'paciente') { atualizarPaciente(msg.room, msg.nome); }
    if (msg.type === 'log')      { adicionarLog(msg.entry); }
  };
}
conectar();
</script>
