<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamada de Enfermagem</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --chamada:     #ef4444;
    --atendimento: #f59e0b;
    --apoio:       #3b82f6;
    --verde:       #22c55e;
    --bg:          #0d1117;
    --surface:     #161b22;
  }

  html, body { height: 100%; background: var(--bg);
    font-family: 'Segoe UI', system-ui, sans-serif; color: #e6edf3; overflow: hidden; }

  .tela {
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; padding: 24px; text-align: center;
  }

  .nome-sala { font-size: clamp(1.6rem, 5vw, 2.4rem); font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase; }
  .sub { font-size: .8rem; color: #8b949e; letter-spacing: 1px; }

  /* ── Botões de chamada ── */
  .botoes { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 380px; }

  .btn-tipo {
    padding: clamp(18px, 4vw, 26px) 20px;
    font-size: clamp(1rem, 3.5vw, 1.3rem);
    font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
    border: none; border-radius: 14px; cursor: pointer;
    transition: transform .15s, box-shadow .2s, opacity .2s;
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .btn-tipo:active { transform: scale(.96); }
  .btn-tipo:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }

  .btn-chamada     { background: var(--chamada);     color: #fff; box-shadow: 0 0 24px #ef444444; }
  .btn-atendimento { background: var(--atendimento); color: #000; box-shadow: 0 0 24px #f59e0b44; }
  .btn-apoio       { background: var(--apoio);       color: #fff; box-shadow: 0 0 24px #3b82f644; }

  .btn-tipo:not(:disabled):hover { filter: brightness(1.1); }

  /* ── Estado aguardando ── */
  .tela.chamando .btn-tipo { opacity: .3; }
  .tela.chamando .btn-ativo {
    opacity: 1 !important;
    animation: pulso 1.2s infinite;
  }
  @keyframes pulso {
    0%,100% { box-shadow: 0 0 8px transparent; }
    50%      { box-shadow: 0 0 30px var(--cor-ativa); }
  }

  .msg-aguardando {
    display: none; flex-direction: column; align-items: center; gap: 10px;
  }
  .tela.chamando .msg-aguardando { display: flex; }

  .aguardando-txt { font-size: .85rem; color: #8b949e; letter-spacing: 1px; }
  .tipo-ativo-txt { font-size: 1rem; font-weight: 700; }

  /* ── Estado atendido ── */
  .tela.atendido { background: #052010; }
  .msg-atendido {
    display: none; flex-direction: column; align-items: center; gap: 16px;
    animation: entrar .5s ease;
  }
  .tela.atendido .msg-atendido  { display: flex; }
  .tela.atendido .bloco-chamada { display: none; }

  @keyframes entrar { from { opacity:0; transform:scale(.9); } to { opacity:1; transform:none; } }

  .check { font-size: clamp(4rem,15vw,7rem); }
  .atendido-txt  { font-size: clamp(1.4rem,5vw,2.2rem); font-weight: 800; color: var(--verde); letter-spacing: 2px; text-transform: uppercase; }
  .atendido-sub  { font-size: .85rem; color: #6ee7b7; letter-spacing: 1px; }

  /* ── Paciente ── */
  .paciente-nome { font-size: .9rem; color: #8b949e; min-height: 22px; letter-spacing: .5px; }

  /* ── Conexão ── */
  .conn-dot { position: fixed; bottom: 14px; right: 14px; width: 10px; height: 10px;
    border-radius: 50%; background: #374151; }
  .conn-dot.ok  { background: var(--verde); box-shadow: 0 0 6px var(--verde); }
  .conn-dot.off { background: #f59e0b; }
</style>
</head>
<body>

<div class="tela" id="tela">

  <div>
    <div class="nome-sala" id="nomeSala">…</div>
    <div class="paciente-nome" id="nomePaciente"></div>
    <div class="sub">Selecione o tipo de chamado</div>
  </div>

  <!-- Botões -->
  <div class="bloco-chamada" id="blocoChamada">
    <div class="botoes">
      <button class="btn-tipo btn-chamada"     id="btnChamada"
        onclick="chamar('chamada')">🔴 Chamar Enfermagem</button>
      <button class="btn-tipo btn-atendimento" id="btnAtendimento"
        onclick="chamar('atendimento')">🟠 Atendimento</button>
      <button class="btn-tipo btn-apoio"       id="btnApoio"
        onclick="chamar('apoio')">🔵 Apoio</button>
    </div>
  </div>

  <!-- Aguardando -->
  <div class="msg-aguardando">
    <div class="tipo-ativo-txt" id="tipoAtivoTxt"></div>
    <div class="aguardando-txt">Aguardando enfermeiro…</div>
  </div>

  <!-- Atendido -->
  <div class="msg-atendido">
    <div class="check">✅</div>
    <div class="atendido-txt">Enfermeiro a caminho!</div>
    <div class="atendido-sub">O enfermeiro já foi acionado. Aguarde.</div>
  </div>

</div>

<div class="conn-dot" id="connDot"></div>

<script>
  const roomId = location.pathname.split('/').filter(Boolean).pop() || 'sala';
  const nomeFormatado = roomId.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());

  document.getElementById('nomeSala').textContent = nomeFormatado;
  document.title = nomeFormatado + ' — Enfermagem';

  const TIPO_LABEL = {
    chamada:     '🔴 Chamou Enfermagem',
    atendimento: '🟠 Atendimento',
    apoio:       '🔵 Apoio',
  };
  const TIPO_COR = {
    chamada:     '#ef4444',
    atendimento: '#f59e0b',
    apoio:       '#3b82f6',
  };

  const tela  = document.getElementById('tela');
  let estado  = 'idle';
  let tipoChamado = null;

  function setEstado(novo, tipo) {
    estado = novo;
    tela.className = 'tela ' + (novo === 'idle' ? '' : novo);

    ['btnChamada','btnAtendimento','btnApoio'].forEach(id => {
      const btn = document.getElementById(id);
      btn.disabled = novo !== 'idle';
      btn.classList.remove('btn-ativo');
    });

    if (novo === 'chamando') {
      tipoChamado = tipo;
      const mapa = { chamada: 'btnChamada', atendimento: 'btnAtendimento', apoio: 'btnApoio' };
      const btn  = document.getElementById(mapa[tipo]);
      btn.classList.add('btn-ativo');
      btn.style.setProperty('--cor-ativa', TIPO_COR[tipo]);
      document.getElementById('tipoAtivoTxt').textContent = TIPO_LABEL[tipo] || tipo;
    }

    if (novo === 'atendido') {
      setTimeout(() => setEstado('idle'), 9000);
    }
  }

  function chamar(tipo) {
    if (estado !== 'idle') return;
    setEstado('chamando', tipo);
    fetch('/api/alert', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ room: roomId, tipo })
    }).catch(() => setEstado('idle'));
  }

  // ── WebSocket ──────────────────────────────────────────────────────────────
  const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;
  const connDot = document.getElementById('connDot');
  let ws;

  function conectar() {
    ws = new WebSocket(WS_URL);
    ws.onopen  = () => connDot.className = 'conn-dot ok';
    ws.onclose = () => { connDot.className = 'conn-dot off'; setTimeout(conectar, 3000); };
    ws.onerror = () => ws.close();

    ws.onmessage = ({ data }) => {
      const msg = JSON.parse(data);

      if (msg.type === 'init') {
        // Paciente desta sala
        const nome = (msg.pacientes || {})[roomId];
        if (nome) document.getElementById('nomePaciente').textContent = nome;
        // Chamado ativo
        if ((msg.alertas || {})[roomId]) setEstado('chamando', msg.alertas[roomId].tipo);
      }

      if (msg.type === 'paciente' && msg.room === roomId) {
        document.getElementById('nomePaciente').textContent = msg.nome || '';
      }

      if (msg.type === 'atendido' && msg.room === roomId) {
        setEstado('atendido');
      }

      if (msg.type === 'alerta' && msg.room === roomId && !msg.ativo && estado === 'chamando') {
        setEstado('idle');
      }
    };
  }
  conectar();
</script>
</body>
</html>
